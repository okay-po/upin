<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pantry Delve — Pixel Dungeon Shooter</title>
<style>
  :root { --ink:#101428; --panel:#18213c; --cream:#fff2c7; --mint:#a8f5cb; --pink:#ff6f9f; --gold:#ffc857; }
  * { box-sizing:border-box; }
  html,body { width:100%; height:100%; margin:0; overflow:hidden; background:#0a0e1c; color:var(--cream); font-family:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",monospace; }
  body { display:grid; place-items:center; background:radial-gradient(ellipse at 50% 10%,#28335d 0,#10172d 40%,#070a14 100%); }
  #shell { position:relative; width:min(100vw, 1280px); aspect-ratio:16/9; max-height:100vh; box-shadow:0 0 0 4px #273052,0 0 55px rgba(89,116,255,.28); }
  canvas { display:block; width:100%; height:100%; image-rendering:pixelated; image-rendering:crisp-edges; cursor:crosshair; background:#121a31; }
  #caption { position:absolute; left:14px; bottom:10px; z-index:3; font-size:10px; letter-spacing:.08em; color:#9facda; opacity:.84; pointer-events:none; text-shadow:1px 1px #0a0e1c; }
  #deviceChoice { display:none; position:absolute; left:50%; bottom:54px; transform:translateX(-50%); z-index:10; width:min(380px,94%); text-align:center; }
  #deviceChoice.active { display:block; }
  #deviceChoice .choice-label { display:block; margin-bottom:6px; color:#fff2c7; font-size:11px; letter-spacing:.08em; text-shadow:1px 1px #080b17; }
  #deviceChoice input { width:100%; height:34px; margin:0 0 7px; padding:0 10px; border:2px solid #7182bd; border-radius:7px; outline:none; background:#0d1530; color:#fff2c7; font:700 13px ui-monospace,SFMono-Regular,Consolas,monospace; text-align:center; text-transform:uppercase; }
  #deviceChoice input:focus { border-color:#a8f5cb; }
  #deviceChoice input.required { border-color:#ff6f9f; color:#ff9cba; animation:requiredPulse .55s steps(2,end) 2; }
  @keyframes requiredPulse { 50% { background:#54243c; } }
  #deviceChoice .choice-row { display:flex; gap:8px; }
  #deviceChoice button { flex:1; min-height:42px; border:2px solid #a9bce9; border-radius:7px; background:#172646; color:#fff2c7; box-shadow:2px 2px #080b17; font:700 12px ui-monospace,SFMono-Regular,Consolas,monospace; cursor:pointer; touch-action:manipulation; }
  #deviceChoice button.mobile-choice { border-color:#ffc857; color:#ffc857; background:#292042; }
  #deviceChoice button:active { transform:translate(1px,1px); box-shadow:1px 1px #080b17; }
  #touchControls { display:none; position:absolute; inset:0; z-index:8; pointer-events:none; touch-action:none; }
  #touchControls.active { display:block; }
  .virtual-stick { position:absolute; bottom:18px; width:128px; height:128px; border:3px solid rgba(168,245,203,.72); border-radius:50%; background:radial-gradient(circle,rgba(36,83,87,.55),rgba(8,19,40,.76)); box-shadow:inset 0 0 0 9px rgba(166,232,240,.08),2px 3px 0 #080b17; pointer-events:auto; touch-action:none; user-select:none; -webkit-user-select:none; }
  .virtual-stick.move-stick { left:18px; border-color:rgba(168,245,203,.78); }
  .virtual-stick.aim-stick { right:18px; border-color:rgba(255,200,87,.82); background:radial-gradient(circle,rgba(100,71,37,.52),rgba(27,20,42,.8)); }
  .stick-knob { position:absolute; left:50%; top:50%; width:55px; height:55px; border:3px solid #e8fff3; border-radius:50%; background:rgba(93,176,163,.8); transform:translate(-50%,-50%); box-shadow:0 2px 0 #10283b; pointer-events:none; }
  .aim-stick .stick-knob { border-color:#fff0bd; background:rgba(232,157,63,.83); }
  .stick-label { position:absolute; left:0; right:0; bottom:10px; text-align:center; color:#dffdf1; font-size:10px; letter-spacing:.08em; pointer-events:none; text-shadow:1px 1px #07111f; }
  .aim-stick .stick-label { color:#fff0bd; }
  .touch-actions { position:absolute; right:156px; bottom:19px; display:grid; grid-template-columns:52px 52px; grid-template-rows:48px 48px; gap:6px; }
  .touch-btn { pointer-events:auto; touch-action:none; user-select:none; -webkit-user-select:none; border:2px solid #a9bce9; border-radius:10px; background:rgba(18,29,57,.9); color:#fff2c7; box-shadow:2px 3px 0 #080b17; font:700 10px ui-monospace,SFMono-Regular,Consolas,monospace; }
  .touch-btn:active, .touch-btn.pressed { transform:translate(1px,2px); background:#3d568b; box-shadow:1px 1px 0 #080b17; }
  .touch-btn.nova { border-color:#a8f5cb; color:#a8f5cb; }.touch-btn.rail { border-color:#ffc857; color:#ffc857; }.touch-btn.open { color:#ffcf8a; }.touch-btn.pause { border-color:#ff8cae; color:#ff9cba; }
  @media (max-width:600px) { .virtual-stick { width:108px; height:108px; bottom:12px; }.virtual-stick.move-stick { left:10px; }.virtual-stick.aim-stick { right:10px; }.stick-knob { width:47px; height:47px; }.stick-label { bottom:8px; font-size:8px; }.touch-actions { right:124px; bottom:14px; grid-template-columns:42px 42px; grid-template-rows:42px 42px; gap:4px; }.touch-btn { font-size:8px; } #caption { display:none; } }
  @media(max-aspect-ratio: 16/9) { #shell { width:100vw; height:auto; } }
</style>
</head>
<body>
<div id="shell">
  <canvas id="game" width="1280" height="720" aria-label="Pantry Delve game"></canvas>
  <div id="caption">WASD / ARROWS MOVE · MOUSE AIM + FIRE · Q HARVEST NOVA · R RAIL SHOT · E OPEN CRATES · ENTER RESTART</div>
  <div id="deviceChoice" aria-label="Player registration and device controls">
    <span class="choice-label">RAIDER REGISTRATION · ENTER YOUR NAME</span>
    <input id="playerNameInput" type="text" maxlength="14" autocomplete="nickname" placeholder="YOUR NAME" aria-label="Player name" />
    <div class="choice-row">
      <button type="button" data-mode="pc">PC · KEYBOARD + MOUSE</button>
      <button type="button" class="mobile-choice" data-mode="mobile">MOBILE · DUAL JOYSTICKS</button>
    </div>
  </div>
  <div id="touchControls" aria-label="Mobile dual-joystick controls">
    <div class="virtual-stick move-stick" id="moveStick" aria-label="Movement joystick"><div class="stick-knob"></div><span class="stick-label">MOVE</span></div>
    <div class="virtual-stick aim-stick" id="aimStick" aria-label="Aim and fire joystick"><div class="stick-knob"></div><span class="stick-label">AIM / FIRE</span></div>
    <div class="touch-actions" aria-label="Special action controls">
      <button class="touch-btn nova" data-tap="q" aria-label="Harvest Nova">NOVA</button>
      <button class="touch-btn rail" data-tap="r" aria-label="Golden Carrot Rail">RAIL</button>
      <button class="touch-btn open" data-tap="e" aria-label="Open crate">OPEN</button>
      <button class="touch-btn pause" id="touchPause" aria-label="Pause game">PAUSE</button>
    </div>
  </div>
</div>
<script>
(() => {
'use strict';
const C = document.getElementById('game'), ctx = C.getContext('2d'), touchControls=document.getElementById('touchControls'), deviceChoice=document.getElementById('deviceChoice'), playerNameInput=document.getElementById('playerNameInput');
ctx.imageSmoothingEnabled = false;
const W=C.width,H=C.height,T=40, COLS=32, ROWS=18;
const keys={}, mouse={x:W/2,y:H/2,down:false};let mobileFire=false,mobileMove={x:0,y:0},mobileAim={x:0,y:0,active:false};let audioCtx=null,soundMuted=false;const soundLast={};


// Original game: a compact, arcade dungeon crawler with pixel-drawn food foes.
const game={floor:1,maxFloor:5,state:'title',time:0,shake:0,score:0,kills:0,needProduce:0,collected:0,notice:'',noticeT:0,exit:null,map:[],player:null,enemies:[],bullets:[],drops:[],crates:[],particles:[],decor:[],spawnClock:0,weapon:{level:1,damage:1,fireRate:1,spread:1,ammoIndex:0,specialCool:0,specialMax:9,specialFlash:0},skill:{cool:0,max:7,flash:0},upgradeOptions:[],leaderboard:[],scoreSaved:false,theme:null,controlMode:null,playerName:'',nutritionQuizPassed:false,quiz:null,finalRank:null};
const palette={wall:'#34436b', wallDark:'#222b4c', floor:'#151d35', grout:'#202a48', cream:'#fff2c7', lime:'#a8f5cb', pink:'#ff6f9f', orange:'#ff9c5b', gold:'#ffc857', red:'#f34f69', blue:'#77baff', dark:'#0b1020'};
const healthyAmmo=['pea','carrot','berry','apple'];
const ammoColors={pea:'#91df72',carrot:'#ffad50',berry:'#bd83f3',apple:'#f36b62',goldenCarrot:'#ffc857'};
const SCORE_KEY='pantryDelveTopPlayersV1';
function loadScores(){try{let saved=JSON.parse(localStorage.getItem(SCORE_KEY)||'[]');return Array.isArray(saved)?saved.filter(x=>x&&Number.isFinite(x.score)&&typeof x.name==='string').slice(0,5):[]}catch(e){return []}}
function saveScore(){
 if(game.scoreSaved)return game.finalRank;game.scoreSaved=true;
 let entry={name:game.playerName||'PANTRY HERO',score:game.score},ranked=[...game.leaderboard,entry].sort((a,b)=>b.score-a.score);game.finalRank=ranked.indexOf(entry)+1;game.leaderboard=ranked.slice(0,5);
 try{localStorage.setItem(SCORE_KEY,JSON.stringify(game.leaderboard))}catch(e){}return game.finalRank;
}

function rand(a,b){return a+Math.random()*(b-a)}
function randi(a,b){return Math.floor(rand(a,b+1))}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x|0,y|0,w|0,h|0)}
function text(s,x,y,size=14,color=palette.cream,align='left'){ctx.fillStyle=color;ctx.font=`bold ${size}px ui-monospace, monospace`;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(s,x|0,y|0)}
function shade(hex,amt){let n=parseInt(hex.slice(1),16),r=clamp((n>>16)+amt,0,255),g=clamp(((n>>8)&255)+amt,0,255),b=clamp((n&255)+amt,0,255);return '#'+(r<<16|g<<8|b).toString(16).padStart(6,'0')}

// Lightweight synthesized sound effects. No external audio files are needed.
function sound(kind){
 if(soundMuted)return;
 try{
  if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();
  let now=audioCtx.currentTime,cooldowns={shoot:.045,hit:.055,enemyShoot:.09};if(cooldowns[kind]&&soundLast[kind]&&now-soundLast[kind]<cooldowns[kind])return;soundLast[kind]=now;
  let spec={shoot:[260,.055,'square',.045],hit:[105,.07,'sawtooth',.065],hurt:[58,.18,'sawtooth',.11],pickup:[690,.13,'square',.055],open:[180,.11,'triangle',.06],clear:[430,.28,'square',.075],dash:[310,.09,'triangle',.04],rail:[145,.34,'sawtooth',.11],nova:[112,.4,'triangle',.10],enemyShoot:[170,.05,'square',.026],boss:[74,.24,'sawtooth',.105],bossKill:[510,.43,'square',.11],upgrade:[720,.24,'triangle',.08],start:[330,.16,'triangle',.055],win:[760,.6,'triangle',.09],pause:[260,.12,'sine',.05],resume:[420,.1,'sine',.05],correct:[620,.22,'triangle',.075],wrong:[82,.25,'sawtooth',.09]}[kind]||[220,.06,'square',.04];
  let osc=audioCtx.createOscillator(),gain=audioCtx.createGain();osc.type=spec[2];osc.frequency.setValueAtTime(spec[0],now);osc.frequency.exponentialRampToValueAtTime(Math.max(32,spec[0]*.52),now+spec[1]);gain.gain.setValueAtTime(spec[3],now);gain.gain.exponentialRampToValueAtTime(.001,now+spec[1]);osc.connect(gain);gain.connect(audioCtx.destination);osc.start(now);osc.stop(now+spec[1]);
  if(['pickup','upgrade','bossKill','win','correct'].includes(kind)){let chime=audioCtx.createOscillator(),cg=audioCtx.createGain();chime.type='sine';chime.frequency.setValueAtTime(spec[0]*1.7,now+.04);cg.gain.setValueAtTime(spec[3]*.52,now+.04);cg.gain.exponentialRampToValueAtTime(.001,now+spec[1]+.13);chime.connect(cg);cg.connect(audioCtx.destination);chime.start(now+.04);chime.stop(now+spec[1]+.13)}
 }catch(err){}
}

function tileAt(x,y){let c=Math.floor(x/T),r=Math.floor(y/T); return (r<0||c<0||r>=ROWS||c>=COLS)?1:game.map[r][c]}
function wallAt(x,y){return tileAt(x,y)===1}
function collides(x,y,rad){return wallAt(x-rad,y-rad)||wallAt(x+rad,y-rad)||wallAt(x-rad,y+rad)||wallAt(x+rad,y+rad)}
function moveBody(o,dx,dy){if(!collides(o.x+dx,o.y,o.r))o.x+=dx;else {let s=Math.sign(dx); while(Math.abs(dx)>.2&&!collides(o.x+s*.25,o.y,o.r)){o.x+=s*.25;dx-=s*.25}} if(!collides(o.x,o.y+dy,o.r))o.y+=dy;else {let s=Math.sign(dy); while(Math.abs(dy)>.2&&!collides(o.x,o.y+s*.25,o.r)){o.y+=s*.25;dy-=s*.25}}}

const floorThemes=[
 {name:'DAMP CELLAR',wall:'#34436b',wallDark:'#222b4c',floorA:'#141c33',floorB:'#161f38',edge:'#4d6091'},
 {name:'FREEZER DEPOT',wall:'#3a5c7b',wallDark:'#21364f',floorA:'#122237',floorB:'#142841',edge:'#71b7d1'},
 {name:'VERDANT GROTTO',wall:'#39645b',wallDark:'#223e3d',floorA:'#132c2d',floorB:'#163333',edge:'#72bd8b'},
 {name:'CANDY CATACOMBS',wall:'#633f70',wallDark:'#41294e',floorA:'#2a1937',floorB:'#301d40',edge:'#ca76c5'},
 {name:'PANTRY CORE',wall:'#735041',wallDark:'#492f32',floorA:'#301d22',floorB:'#382126',edge:'#df9a62'}
];
const floorLayouts=[
 // Floor 1: an old cellar with a forked route.
 [{x:2,y:2,w:7,h:6},{x:12,y:2,w:7,h:5},{x:22,y:2,w:8,h:6},{x:4,y:11,w:8,h:5},{x:16,y:10,w:7,h:6},{x:26,y:11,w:4,h:5}],
 // Floor 2: a wide, icy storage depot.
 [{x:2,y:2,w:6,h:5},{x:11,y:2,w:7,h:5},{x:22,y:2,w:8,h:5},{x:3,y:10,w:6,h:6},{x:13,y:10,w:7,h:4},{x:23,y:10,w:7,h:6}],
 // Floor 3: a greenhouse-shaped dungeon with a side entrance.
 [{x:2,y:6,w:6,h:7},{x:3,y:2,w:5,h:3},{x:11,y:2,w:6,h:5},{x:21,y:2,w:7,h:5},{x:11,y:10,w:6,h:6},{x:21,y:10,w:7,h:6}],
 // Floor 4: long candy halls split by a lower arcade.
 [{x:2,y:2,w:6,h:6},{x:10,y:2,w:5,h:5},{x:18,y:2,w:5,h:6},{x:25,y:2,w:5,h:5},{x:4,y:11,w:7,h:5},{x:14,y:10,w:6,h:6},{x:25,y:11,w:5,h:5}],
 // Floor 5: the compact, dangerous center of the pantry.
 [{x:2,y:7,w:6,h:6},{x:10,y:3,w:6,h:5},{x:18,y:2,w:6,h:5},{x:25,y:4,w:5,h:6},{x:10,y:12,w:6,h:4},{x:19,y:11,w:6,h:5},{x:26,y:12,w:4,h:4}]
];
let rooms=[];
function makeMap(){
 let m=Array.from({length:ROWS},()=>Array(COLS).fill(1)),layout=floorLayouts[(game.floor-1)%floorLayouts.length];
 game.theme=floorThemes[(game.floor-1)%floorThemes.length];rooms=layout.map(q=>({...q}));
 for(const q of rooms)for(let y=q.y;y<q.y+q.h;y++)for(let x=q.x;x<q.x+q.w;x++)m[y][x]=0;
 function corridor(a,b,verticalFirst=false){let x1=Math.floor(a.x+a.w/2),y1=Math.floor(a.y+a.h/2),x2=Math.floor(b.x+b.w/2),y2=Math.floor(b.y+b.h/2);if(verticalFirst){for(let y=Math.min(y1,y2);y<=Math.max(y1,y2);y++)m[y][x1]=0;for(let x=Math.min(x1,x2);x<=Math.max(x1,x2);x++)m[y2][x]=0}else{for(let x=Math.min(x1,x2);x<=Math.max(x1,x2);x++)m[y1][x]=0;for(let y=Math.min(y1,y2);y<=Math.max(y1,y2);y++)m[y][x2]=0}}
 // Each layout uses a different route and at least one shortcut.
 for(let i=1;i<rooms.length;i++)corridor(rooms[i-1],rooms[i],i%2===0);
 if(rooms.length>5)corridor(rooms[0],rooms[Math.min(3,rooms.length-1)],true);
 if(rooms.length>6)corridor(rooms[2],rooms[5],false);
 return m;
}
function pointInRoom(room){return {x:(room.x+randi(1,room.w-2))*T+20,y:(room.y+randi(1,room.h-2))*T+20}}

function resetFloor(){
 game.map=makeMap();game.enemies=[];game.bullets=[];game.drops=[];game.crates=[];game.particles=[];game.decor=[];game.kills=0;game.collected=0; game.needProduce=2+game.floor;
 let startRoom=rooms[0],exitRoom=rooms[rooms.length-1];game.exit={x:(exitRoom.x+Math.floor(exitRoom.w/2))*T+20,y:(exitRoom.y+Math.floor(exitRoom.h/2))*T+20,open:false};
 game.player={x:(startRoom.x+Math.floor(startRoom.w/2))*T+20,y:(startRoom.y+Math.floor(startRoom.h/2))*T+20,r:12,hp:6,maxHp:6,inv:0,shoot:0,angle:0,walk:0};game.skill.cool=0;game.skill.flash=0;
 let pool=rooms.slice(1,-1), n=4+game.floor*3;
 for(let i=0;i<n;i++){let p=pointInRoom(pool[i%pool.length]);spawnEnemy(p.x,p.y,(i*3+game.floor*2)%14)}
 let bossPoint=pointInRoom(pool[pool.length-1]),floorBoss=spawnBoss(bossPoint.x,bossPoint.y);
 // Hiding spots can be opened with E nearby or destroyed by a player shot.
 let crateRooms=rooms.slice(1,-1);
 for(let i=0;i<game.needProduce;i++){let p=pointInRoom(crateRooms[i%crateRooms.length]);game.crates.push({x:p.x,y:p.y,r:15,open:false,kind:i%2?'fruit':'veg'});}
 for(let i=0;i<72;i++){let p=pointInRoom(rooms[i%rooms.length]);game.decor.push({x:p.x,y:p.y,type:i%3});}
 game.notice=`FLOOR ${game.floor}: ${game.theme.name} — ENEMIES LV.${game.floor} · DMG ${floorBoss.damage.toFixed(1)} · DURABILITY +${game.floor-1} · BOSS: ${floorBoss.name}`;game.noticeT=3.2;game.state='playing';
}
function spawnEnemy(x,y,type){
 const types=[
  {name:'BURGER',hp:3,speed:48,r:15,color:'#f8aa4c',shoot:0,range:0},
  {name:'SODA POP',hp:2,speed:34,r:13,color:'#85d9ff',shoot:rand(.3,1),range:330},
  {name:'DONUT',hp:2,speed:70,r:13,color:'#f586b8',shoot:0,range:0},
  {name:'PIZZA',hp:3,speed:42,r:15,color:'#ffc65a',shoot:rand(.7,1.5),range:250},
  {name:'CUPCAKE',hp:2,speed:66,r:13,color:'#f06f9c',shoot:0,range:0},
  {name:'CHIPS BAG',hp:2,speed:43,r:12,color:'#ffaf4e',shoot:rand(.4,1.2),range:305},
  {name:'FRIES',hp:3,speed:76,r:14,color:'#ffd55b',shoot:0,range:0},
  {name:'ICE CREAM',hp:5,speed:28,r:17,color:'#f7a4ce',shoot:rand(.6,1.4),range:260},
  {name:'COLA CAN',hp:3,speed:38,r:13,color:'#ef5b5e',shoot:rand(.2,.9),range:360},
  {name:'MILKSHAKE',hp:4,speed:31,r:15,color:'#f6a1c4',shoot:rand(.5,1.3),range:285},
  {name:'HOT DOG',hp:3,speed:62,r:14,color:'#e77747',shoot:0,range:0},
  {name:'TACO',hp:2,speed:82,r:13,color:'#f2bf55',shoot:0,range:0},
  {name:'FRIED CHICKEN',hp:6,speed:24,r:18,color:'#d77b45',shoot:0,range:0},
  {name:'POPCORN',hp:3,speed:40,r:13,color:'#f6d857',shoot:rand(.3,1.1),range:335}
 ]; let q=types[type],level=game.floor,durability=level-1,hp=q.hp+durability,speed=q.speed+durability*4,damage=+(1+durability*.25).toFixed(2);game.enemies.push({x,y,r:q.r,type,hp,maxHp:hp,speed,color:q.color,cool:q.shoot,range:q.range,damage,durability,level,angle:0,hit:0,dead:0,dash:0,name:q.name});
}
function spawnBoss(x,y){
 const bosses=[
  {name:'BURGER BARON',color:'#f5a449'},
  {name:'SODA SULTAN',color:'#70cfff'},
  {name:'DONUT DREAD',color:'#f383b1'},
  {name:'PIZZA TYRANT',color:'#ffc65a'},
  {name:'THE JUNK LORD',color:'#b889ff'}
 ];let q=bosses[(game.floor-1)%bosses.length],hp=15+game.floor*6;
 let boss={x,y,r:27,type:-1,boss:true,bossStyle:game.floor-1,hp,maxHp:hp,speed:30+game.floor*3,color:q.color,cool:.9,range:500,damage:+(1+(game.floor-1)*.3).toFixed(1),durability:game.floor*6,level:game.floor,angle:0,hit:0,dead:0,dash:0,name:q.name};game.enemies.push(boss);return boss;
}
function bossVolley(e){
 let a=Math.atan2(game.player.y-e.y,game.player.x-e.x);for(let i=-1;i<=1;i++){let ang=a+i*.23;game.bullets.push({x:e.x+Math.cos(ang)*24,y:e.y+Math.sin(ang)*24,vx:Math.cos(ang)*225,vy:Math.sin(ang)*225,r:6,life:2.2,from:'e',dmg:e.damage,color:palette.orange,bossShot:true});}
 emit(e.x,e.y,palette.orange,7,75);sound('boss');
}
function emit(x,y,color,n=8,spd=90){for(let i=0;i<n;i++){let a=rand(0,Math.PI*2),v=rand(spd*.35,spd);game.particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:rand(.22,.55),max:.55,color,size:randi(2,5)})}}
function playerBullet(){
 let p=game.player,w=game.weapon;if(p.shoot>0||game.state!=='playing')return;
 let a=p.angle,shots=w.spread;p.shoot=.16/w.fireRate;

function bindVirtualStick(stick,kind){
 const knob=stick.querySelector('.stick-knob');let activeId=null;
 function setVector(e){let r=stick.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,dx=e.clientX-cx,dy=e.clientY-cy,max=r.width*.31,len=Math.hypot(dx,dy)||1,scale=Math.min(1,max/len),vx=dx*scale/max,vy=dy*scale/max;knob.style.transform=`translate(calc(-50% + ${vx*max}px),calc(-50% + ${vy*max}px))`;if(kind==='move'){mobileMove.x=vx;mobileMove.y=vy}else{mobileAim={x:vx,y:vy,active:Math.hypot(vx,vy)>.12};mobileFire=mobileAim.active}}

}
